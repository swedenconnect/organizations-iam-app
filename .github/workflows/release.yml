name: Versioned publication of docker image
on:
  push:
    tags:
      - 'v*'
jobs:
  ghcr-release:
    uses: ./.github/workflows/docker-release.yml
    secrets: inherit
    with:
      service-path: iam-admin-app/backend
      frontend-path: iam-admin-app/frontend
      revision-property: service-revision